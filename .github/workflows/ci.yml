name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-v1:
    name: SDK v1 (iframe) — E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start local server
        run: npx serve . -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 10000

      - name: Run HR Avatar E2E tests
        run: node examples/hr_avatar/test-e2e.js

      - name: Run Code Interview E2E tests
        run: node examples/code_interview/test-e2e.js

  test-v2:
    name: SDK v2 (direct) — Unit & GenUI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: sdk-v2
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run unit + GenUI tests (125 tests)
        working-directory: sdk-v2
        run: npm test

  lint:
    name: Lint & Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check SDK v1 file size (must be <8KB minified)
        run: |
          MAX_SIZE=8192
          SIZE=$(wc -c < sdk/kaltura-avatar-sdk.min.js)
          echo "SDK v1 minified: ${SIZE} bytes"
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::SDK v1 size ($SIZE bytes) exceeds limit ($MAX_SIZE bytes)"
            exit 1
          fi

      - name: Check SDK v2 file size (must be <120KB)
        run: |
          MAX_SIZE=122880
          SIZE=$(wc -c < sdk-v2/dist/kaltura-avatar-sdk.js)
          echo "SDK v2: ${SIZE} bytes"
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::SDK v2 size ($SIZE bytes) exceeds limit ($MAX_SIZE bytes)"
            exit 1
          fi

      - name: Validate JSON schemas
        run: |
          for f in $(find . -name "*.schema.json" -not -path "*/node_modules/*"); do
            echo "Validating: $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" || exit 1
          done

      - name: Check for console.log in production SDK v1
        run: |
          if grep -n "console.log" sdk/kaltura-avatar-sdk.js | grep -v "console.error"; then
            echo "::warning::Found console.log in SDK v1 source (only console.error is allowed)"
          fi
