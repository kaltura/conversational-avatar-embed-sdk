<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaltura Avatar SDK (Socket) — Demo</title>
    <!-- Socket.IO (peer dependency) -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- SDK: use relative path for local dev, or the CDN URL in production:
         https://cdn.jsdelivr.net/gh/kaltura/conversational-avatar-embed-sdk@latest/sdk-socket/dist/kaltura-avatar-sdk.js -->
    <script src="../../dist/kaltura-avatar-sdk.js"></script>
    <!-- Analytics plugin (optional) -->
    <script src="../../plugins/kava-analytics/kaltura-avatar-analytics.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d18; color: #e0e0e8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 16px 24px; background: #111119; border-bottom: 1px solid #1c1c2c; display: flex; align-items: center; gap: 16px; }
        header h1 { font-size: 16px; font-weight: 600; color: #7a8abf; }
        header .version { font-size: 11px; color: #555; background: #1a1a28; padding: 2px 8px; border-radius: 4px; }

        .config-bar { padding: 12px 24px; background: #0f0f1a; border-bottom: 1px solid #1c1c2c; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .config-bar label { font-size: 11px; color: #666; }
        .config-bar input { background: #181828; border: 1px solid #2a2a3a; color: #ccc; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: inherit; width: 180px; }
        .config-bar input:focus { outline: none; border-color: #4a5aaa; }
        .config-bar button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
        .btn-connect { background: #2a5a3a; color: #4ade80; }
        .btn-connect:hover { background: #3a6a4a; }
        .btn-connect:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-disconnect { background: #5a2a2a; color: #f87171; }
        .btn-disconnect:hover { background: #6a3a3a; }
        .btn-disconnect:disabled { opacity: 0.4; cursor: not-allowed; }

        main { flex: 1; display: grid; grid-template-columns: 1fr 380px; min-height: 0; overflow: hidden; }

        .video-section { display: flex; flex-direction: column; background: #000; min-height: 0; }
        .video-wrapper { flex: 1; display: flex; align-items: stretch; min-height: 0; position: relative; }
        #avatar-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        #avatar-container video { width: 100%; height: 100%; object-fit: contain; transition: all 0.4s ease; }
        .status-badge { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-family: 'SF Mono', monospace; display: flex; gap: 12px; }
        .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .status-badge .dot.green { background: #4ade80; }
        .status-badge .dot.yellow { background: #fbbf24; }
        .status-badge .dot.red { background: #f87171; }
        .status-badge .dot.gray { background: #444; }

        .chat-input { display: flex; gap: 8px; padding: 12px 16px; background: #111119; border-top: 1px solid #1c1c2c; }
        .chat-input input { flex: 1; padding: 10px 16px; background: #181828; border: 1px solid #2a2a3a; border-radius: 10px; color: #e0e0e8; font-size: 13px; font-family: inherit; }
        .chat-input input:focus { outline: none; border-color: #4a5aaa; }
        .chat-input input::placeholder { color: #3a3a4a; }
        .chat-input input:disabled { opacity: 0.4; }
        .chat-input button { padding: 10px 20px; border-radius: 10px; background: #3a4a8a; border: none; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; }
        .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }

        .sidebar { display: flex; flex-direction: column; border-left: 1px solid #1c1c2c; background: #0f0f1a; min-height: 0; overflow: hidden; }
        .sidebar-tabs { display: flex; background: #111119; border-bottom: 1px solid #1c1c2c; flex-shrink: 0; }
        .sidebar-tabs button { flex: 1; padding: 10px; border: none; background: none; color: #555; font-size: 11px; font-family: inherit; cursor: pointer; border-bottom: 2px solid transparent; }
        .sidebar-tabs button.active { color: #e0e0e8; border-bottom-color: #667eea; }

        .sidebar-panels { flex: 1; overflow: hidden; min-height: 0; display: flex; flex-direction: column; }
        .panel { display: none; padding: 16px; overflow-y: auto; flex: 1; min-height: 0; }
        .panel.active { display: flex; flex-direction: column; }

        .transcript { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; }
        .bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; max-width: 90%; word-wrap: break-word; }
        .bubble.avatar { background: #1a2540; align-self: flex-start; border-bottom-left-radius: 4px; }
        .bubble.user { background: #1a3528; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble .role { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
        .empty-state { color: #333; text-align: center; padding: 40px 20px; font-size: 13px; }

        .log { font-family: 'SF Mono', monospace; font-size: 11px; overflow-y: auto; flex: 1; }
        .log-entry { padding: 4px 8px; margin-bottom: 2px; border-radius: 4px; background: #111119; border-left: 3px solid #2a2a3a; }
        .log-entry .time { color: #3a3a4a; font-size: 10px; }
        .log-entry .name { color: #4ade80; font-weight: 600; margin-left: 4px; }
        .log-entry .detail { color: #555; display: block; margin-top: 2px; font-size: 10px; word-break: break-all; }

        .dpp-section { margin-bottom: 16px; }
        .dpp-section h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #4a4a6a; margin-bottom: 8px; }
        .dpp-section textarea { width: 100%; min-height: 100px; background: #181828; border: 1px solid #2a2a3a; color: #ccc; padding: 10px; border-radius: 6px; font-family: 'SF Mono', monospace; font-size: 11px; resize: vertical; }
        .dpp-section textarea:focus { outline: none; border-color: #4a5aaa; }
        .dpp-section button { width: 100%; margin-top: 6px; padding: 8px; background: #3a4a8a; border: none; color: #fff; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .dpp-section button:disabled { opacity: 0.4; cursor: not-allowed; }

        .commands-section h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #4a4a6a; margin-bottom: 8px; }
        .commands-section .cmd-list { font-size: 11px; color: #888; }
        .commands-section .cmd-list .cmd { margin-bottom: 4px; padding: 4px 8px; background: #151520; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <h1>Kaltura Avatar SDK (Socket)</h1>
    <span class="version" id="version-badge"></span>
</header>

<div class="config-bar">
    <label>Server:</label>
    <select id="cfg-server" style="padding:6px 8px;background:#181828;border:1px solid #2a2a3a;border-radius:6px;color:#e0e0e8;font-size:12px;">
        <option value="https://conversation.avatar.us.kaltura.ai">US Production</option>
        <option value="https://conversation.avatar.qa.kaltura.ai">QA</option>
        <option value="custom">Custom...</option>
    </select>
    <input type="text" id="cfg-server-custom" value="" placeholder="wss://custom-server" style="width:180px;display:none">
    <label>Client ID:</label>
    <input type="text" id="cfg-client-id" value="115767973963657880005" placeholder="Client ID">
    <label>Flow ID:</label>
    <input type="text" id="cfg-flow-id" value="agent-1" placeholder="Flow ID">
    <label><input type="checkbox" id="cfg-captions" checked> Captions</label>
    <label><input type="checkbox" id="cfg-kava"> KAVA</label>
    <label style="display:none" id="lbl-partner">PID:</label>
    <input type="text" id="cfg-partner-id" value="" placeholder="Partner ID" style="width:90px;display:none">
    <button class="btn-connect" id="btn-connect" onclick="doConnect()">Connect</button>
    <button class="btn-disconnect" id="btn-disconnect" onclick="doDisconnect()" disabled>Disconnect</button>
</div>

<main>
    <div class="video-section">
        <div class="video-wrapper">
            <div id="avatar-container"></div>
            <div class="status-badge" id="status-badge" style="display:none">
                <span><span class="dot gray" id="dot-state"></span><span id="lbl-state">—</span></span>
                <span id="vad-indicator" style="display:none"><span class="dot green"></span>User speaking</span>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="text-input" placeholder="Type a message to the avatar..." disabled>
            <button id="btn-send" onclick="doSendText()" disabled>Send</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-tabs">
            <button class="active" onclick="switchTab('chat', this)">Chat</button>
            <button onclick="switchTab('events', this)">Events</button>
            <button onclick="switchTab('dpp', this)">DPP</button>
            <button onclick="switchTab('commands', this)">Commands</button>
        </div>
        <div class="sidebar-panels">
            <div class="panel active" id="panel-chat">
                <div class="transcript" id="transcript">
                    <div class="empty-state">Conversation will appear here once connected.</div>
                </div>
            </div>
            <div class="panel" id="panel-events">
                <div class="log" id="event-log"></div>
            </div>
            <div class="panel" id="panel-dpp">
                <div class="dpp-section">
                    <h4>Inject Dynamic Prompt</h4>
                    <textarea id="dpp-textarea" placeholder='{"v":"2","user":{"first_name":"Test"},"inst":["Greet by name."]}'></textarea>
                    <button id="btn-inject-dpp" onclick="doInjectDPP()" disabled>Inject DPP</button>
                </div>
            </div>
            <div class="panel" id="panel-commands">
                <div class="commands-section" style="display:flex;flex-direction:column;flex:1;min-height:0;">
                    <h4>Registered Commands</h4>
                    <div class="cmd-list" id="cmd-list"></div>
                    <h4 style="margin-top:16px;">Server Events (GenUI)</h4>
                    <div class="log" id="server-events-log" style="flex:1;overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
// ── Demo Application ──
// Uses an IIFE to avoid polluting the global scope.
// Only `sdk` is exposed for DevTools inspection — analytics state is encapsulated.

(function() {
'use strict';

var sdk = null;
var analytics = null;

document.getElementById('version-badge').textContent = 'v' + KalturaAvatarSDK.VERSION;

// KAVA checkbox toggles partner ID field visibility
document.getElementById('cfg-kava').addEventListener('change', function() {
    var show = this.checked ? '' : 'none';
    document.getElementById('lbl-partner').style.display = show;
    document.getElementById('cfg-partner-id').style.display = show;
});

// Server selector toggles custom URL field
document.getElementById('cfg-server').addEventListener('change', function() {
    var custom = document.getElementById('cfg-server-custom');
    custom.style.display = this.value === 'custom' ? '' : 'none';
});

// Text input keyboard shortcut
document.getElementById('text-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendText();
});

function connect() {
    var clientId = document.getElementById('cfg-client-id').value.trim();
    var flowId = document.getElementById('cfg-flow-id').value.trim();

    if (!clientId || !flowId) { alert('Client ID and Flow ID are required'); return; }

    if (sdk) sdk.destroy();
    if (analytics) { analytics.destroy(); analytics = null; }

    var captionsEnabled = document.getElementById('cfg-captions').checked;
    var serverSelect = document.getElementById('cfg-server');
    var serverUrl = serverSelect.value === 'custom'
        ? document.getElementById('cfg-server-custom').value.trim()
        : serverSelect.value;

    var sdkConfig = {
        clientId: clientId,
        flowId: flowId,
        container: '#avatar-container',
        debug: true,
        media: { ariaLabel: 'Demo Avatar' },
        captions: { enabled: captionsEnabled }
    };
    if (serverUrl) {
        var region = serverUrl.match(/avatar\.(\w+)\.kaltura/);
        var whepUrl = region ? 'https://srs.avatar.' + region[1] + '.kaltura.ai' : null;
        sdkConfig.endpoints = { socket: serverUrl };
        if (whepUrl) sdkConfig.endpoints.whep = whepUrl;
    }

    sdk = new KalturaAvatarSDK(sdkConfig);

    // Register demo commands
    sdk.registerCommand('end-session', 'ending call now', function(match) {
        logEvent('command', '[' + match.timing + '] "' + match.command + '" in "' + match.text.substring(0, 50) + '"');
        disconnect();
    });
    sdk.registerCommand('navigate', /navigating to slide/i, function(match) {
        logEvent('command', '[' + match.timing + '] "' + match.command + '" — instant reaction before speech finishes');
    }, { timing: 'before' });
    updateCommandList();

    // Wire up events
    sdk.on('*', function(event, payload) {
        logEvent('event', event, payload);
    });

    sdk.on(KalturaAvatarSDK.Events.READY, function() {
        updateUI('connected');
        logEvent('lifecycle', 'Avatar ready — in conversation');
    });

    sdk.on(KalturaAvatarSDK.Events.AVATAR_SPEECH, function(data) {
        addBubble('avatar', data.text);
    });

    sdk.on(KalturaAvatarSDK.Events.USER_SPEECH, function(data) {
        if (!data.isFinal) return;
        document.getElementById('vad-indicator').style.display = 'none';
        addBubble('user', data.text);
    });

    sdk.on(KalturaAvatarSDK.Events.USER_SPEAKING_START, function() {
        document.getElementById('vad-indicator').style.display = '';
        logEvent('vad', 'User started speaking');
    });

    sdk.on(KalturaAvatarSDK.Events.DISCONNECTED, function() {
        updateUI('disconnected');
    });

    sdk.on(KalturaAvatarSDK.Events.ERROR, function(err) {
        logEvent('error', err.code + ': ' + err.message);
    });

    sdk.on(KalturaAvatarSDK.Events.GENUI, function(data) {
        logEvent('genui', data.type + ': ' + JSON.stringify(data.data));
        addServerEvent(data.type, data.data);
    });

    sdk.on(KalturaAvatarSDK.Events.GENUI_RENDERED, function(data) {
        logEvent('genui', 'Rendered: ' + data.type + ' (' + data.category + ')');
    });

    sdk.on(KalturaAvatarSDK.Events.GENUI_INTERACTION, function(data) {
        logEvent('genui', 'Interaction: ' + data.interactionType);
    });

    sdk.on(KalturaAvatarSDK.Events.SERVER_CONNECTED, function(data) {
        logEvent('lifecycle', 'Server connected — agent: ' + (data.agentName || 'unknown'));
    });

    sdk.on(KalturaAvatarSDK.Events.CONFIGURED, function(info) {
        logEvent('lifecycle', 'Configured — ' + (info.agentName || 'agent') + ', ' + info.videosCount + ' videos, lang: ' + info.language);
        if (info.features) {
            logEvent('info', 'Features: interruptions=' + info.features.interruptions + ', pause=' + info.features.pause + ', screenShare=' + info.features.screenShare);
        }
    });

    sdk.on(KalturaAvatarSDK.Events.TIME_WARNING, function(data) {
        logEvent('warning', 'Time warning: ' + data.remainingSeconds + 's remaining');
    });

    sdk.on(KalturaAvatarSDK.Events.TIME_EXPIRED, function() {
        logEvent('warning', 'Session time expired');
    });

    // Attach KAVA analytics plugin if enabled
    if (document.getElementById('cfg-kava').checked) {
        var partnerId = document.getElementById('cfg-partner-id').value.trim();
        if (partnerId) {
            try {
                analytics = new KalturaAvatarAnalytics(sdk, {
                    ks: 'demo-session',
                    partnerId: Number(partnerId),
                    debug: true
                });
                analytics.on('sent', function(evt) {
                    logEvent('kava', 'Sent: type=' + evt.eventType + ' idx=' + evt.params.eventIndex);
                });
                analytics.on('error', function(evt) {
                    logEvent('kava', 'Error: type=' + evt.eventType + ' ' + evt.error.message);
                });
                logEvent('kava', 'Plugin attached (PID: ' + partnerId + ')');
            } catch (err) {
                logEvent('error', 'KAVA init failed: ' + err.message);
            }
        } else {
            logEvent('warning', 'KAVA enabled but no Partner ID provided');
        }
    }

    // Start connection
    updateUI('connecting');
    sdk.connect().catch(function(err) {
        logEvent('error', 'Connection failed: ' + err.message);
        updateUI('disconnected');
    });
}

function disconnect() {
    if (!sdk) return;
    if (analytics) {
        var stats = analytics.getStats();
        logEvent('kava', 'Stats: ' + stats.eventsSent + ' sent, ' + stats.errors + ' errors, ' + stats.callDuration + 's call');
        analytics.destroy();
        analytics = null;
    }
    sdk.end();
    updateUI('disconnected');
}

function sendText() {
    var input = document.getElementById('text-input');
    var text = input.value.trim();
    if (!text || !sdk) return;
    sdk.sendText(text);
    input.value = '';
}

function injectDPP() {
    if (!sdk) return;
    var textarea = document.getElementById('dpp-textarea');
    var text = textarea.value.trim();
    if (!text) return;
    try {
        sdk.injectDPP(text);
        logEvent('dpp', 'Injected: ' + text.substring(0, 60) + '...');
    } catch (err) {
        logEvent('error', 'DPP error: ' + err.message);
    }
}

// ── UI Helpers ──

function switchTab(id, btn) {
    var buttons = btn.parentElement.querySelectorAll('button');
    for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
    btn.classList.add('active');
    var panels = document.querySelectorAll('.panel');
    for (var i = 0; i < panels.length; i++) panels[i].classList.remove('active');
    document.getElementById('panel-' + id).classList.add('active');
}

function updateUI(state) {
    var badge = document.getElementById('status-badge');
    var dot = document.getElementById('dot-state');
    var lbl = document.getElementById('lbl-state');

    badge.style.display = '';
    dot.className = 'dot ' + (state === 'connected' ? 'green' : state === 'connecting' ? 'yellow' : 'gray');
    lbl.textContent = state;

    document.getElementById('btn-connect').disabled = (state === 'connecting' || state === 'connected');
    document.getElementById('btn-disconnect').disabled = (state === 'disconnected');
    document.getElementById('text-input').disabled = (state !== 'connected');
    document.getElementById('btn-send').disabled = (state !== 'connected');
    document.getElementById('btn-inject-dpp').disabled = (state !== 'connected');
}

function addBubble(role, text) {
    var container = document.getElementById('transcript');
    var empty = container.querySelector('.empty-state');
    if (empty) empty.remove();
    var el = document.createElement('div');
    el.className = 'bubble ' + role;
    var roleLabel = document.createElement('div');
    roleLabel.className = 'role';
    roleLabel.textContent = role === 'avatar' ? 'Avatar' : 'You';
    el.appendChild(roleLabel);
    el.appendChild(document.createTextNode(text));
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
}

function logEvent(type, text, data) {
    var log = document.getElementById('event-log');
    var entry = document.createElement('div');
    entry.className = 'log-entry';
    var time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    var detail = '';
    if (data && typeof data === 'object') {
        try { detail = JSON.stringify(data); } catch(e) {}
    }
    var timeSpan = document.createElement('span');
    timeSpan.className = 'time';
    timeSpan.textContent = time;
    var nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.textContent = text;
    entry.appendChild(timeSpan);
    entry.appendChild(nameSpan);
    if (detail) {
        var detailSpan = document.createElement('span');
        detailSpan.className = 'detail';
        detailSpan.textContent = detail;
        entry.appendChild(detailSpan);
    }
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
}

function updateCommandList() {
    var list = document.getElementById('cmd-list');
    if (!sdk) { list.textContent = ''; return; }
    var commands = sdk.getCommands ? sdk.getCommands() : [];
    list.textContent = '';
    if (commands.length === 0) {
        var cmd = document.createElement('div');
        cmd.className = 'cmd';
        cmd.textContent = 'end-session — triggers on "ending call now"';
        list.appendChild(cmd);
    } else {
        for (var i = 0; i < commands.length; i++) {
            var cmd = document.createElement('div');
            cmd.className = 'cmd';
            cmd.textContent = commands[i].name + ' — ' + String(commands[i].pattern);
            list.appendChild(cmd);
        }
    }
}

function addServerEvent(type, data) {
    var log = document.getElementById('server-events-log');
    var entry = document.createElement('div');
    entry.className = 'log-entry';
    var time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    var detail = data ? JSON.stringify(data) : '';
    var timeSpan = document.createElement('span');
    timeSpan.className = 'time';
    timeSpan.textContent = time;
    var nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.textContent = type;
    entry.appendChild(timeSpan);
    entry.appendChild(nameSpan);
    if (detail) {
        var detailSpan = document.createElement('span');
        detailSpan.className = 'detail';
        detailSpan.textContent = detail;
        entry.appendChild(detailSpan);
    }
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
}

// Expose minimal API for testing without global pollution
window._demoApp = { getAnalytics: function() { return analytics; } };

// Expose handlers for HTML onclick attributes
window.doConnect = connect;
window.doDisconnect = disconnect;
window.doSendText = sendText;
window.doInjectDPP = injectDPP;
window.switchTab = switchTab;

})();
</script>
</body>
</html>
